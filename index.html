<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리스트업 - 모바일 게임 리세계 직거래 플랫폼</title>
  <meta name="description" content="원신, 블루아카이브, 니케, 쿠키런킹덤 리세계 계정 직거래. 안전하고 빠른 리세계 매물 거래 플랫폼 리스트업.">
  <meta property="og:title" content="리스트업 - 리세계 직거래 플랫폼">
  <meta property="og:description" content="모바일 게임 리세계 계정 직거래 매물을 한 곳에서.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="navbar"></div>

<div class="hero">
  <h1>리세계 매물, 한 곳에서 거래하세요</h1>
  <p>원신 · 블루아카이브 · 니케 · 쿠키런킹덤</p>
  <div class="hero-stats">
    <div class="hero-stat">
      <strong id="stat-listings">-</strong>
      <span>전체 매물</span>
    </div>
    <div class="hero-stat">
      <strong>4</strong>
      <span>지원 게임</span>
    </div>
  </div>
</div>

<div class="page-wrapper">
  <!-- 게임 선택 4열 그리드 -->
  <div class="game-grid" id="game-grid"></div>

  <!-- 최근 매물 -->
  <div class="content-header">
    <div class="content-title">최근 등록 매물</div>
    <a href="/trade/register.html" class="btn btn-primary">✏️ 판매글 등록</a>
  </div>
  <div id="recent-listings">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/listings.js"></script>
<script>
  document.getElementById('navbar').innerHTML = renderNavbar('home')

  // 게임 그리드
  document.getElementById('game-grid').innerHTML = GAMES.map(g => `
    <a href="${g.path}" class="game-card">
      <span class="game-emoji">${g.emoji}</span>
      <span class="game-name">${g.nameKo}</span>
      <span class="game-count" id="count-${g.slug}">조회 중...</span>
      <span class="game-arrow">매물 보기 →</span>
    </a>
  `).join('')

  async function loadGameCounts() {
    for (const g of GAMES) {
      const { data: game } = await db.from('Game').select('id').eq('slug', g.slug).single()
      if (!game) continue
      const { count } = await db.from('Listing').select('*', { count: 'exact', head: true }).eq('status', 'active').eq('gameId', game.id)
      const el = document.getElementById(`count-${g.slug}`)
      if (el) el.textContent = `매물 ${count ?? 0}개`
    }
  }

  async function loadStats() {
    const { count } = await db.from('Listing').select('*', { count: 'exact', head: true }).eq('status', 'active')
    document.getElementById('stat-listings').textContent = (count ?? 0) + '개'
  }

  loadListings({ container: 'recent-listings', limit: 6 })
  loadStats()
  loadGameCounts()
</script>
</body>
</html>
