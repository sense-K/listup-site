<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블루아카이브 리세계 판매 | 리스트업</title>
  <meta name="description" content="블루아카이브 리세계 계정 직거래 매물. 고성능 블루아카이브 계정을 안전하게 구매하세요. 블루아카이브 판매계정, 블루아카이브 리세계 거래.">
  <meta property="og:title" content="블루아카이브 리세계 판매 매물 | 리스트업">
  <meta property="og:description" content="블루아카이브 리세계 계정을 직접 거래하세요.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navbar"></div>
<div class="container">
  <div class="game-tabs" id="game-tabs"></div>
  <div style="display:flex;gap:8px;margin-bottom:16px;">
    <select class="form-select" id="server-filter" style="flex:1;min-width:120px;">
      <option value="">전체 서버</option>
    </select>
  </div>
  <div class="section-title">블루아카이브 매물 <span class="count-badge" id="listing-count"></span></div>
  <div id="listings-container"></div>
</div>
<a href="/trade/register.html" class="fab">✏️ 판매글 등록</a>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/listings.js"></script>
<script>
  const GAME_SLUG = 'bluearchive'
  document.getElementById('navbar').innerHTML = renderNavbar()
  document.getElementById('game-tabs').innerHTML = renderGameTabs(GAME_SLUG)
  async function loadServers() {
    const { data: game } = await db.from('Game').select('id').eq('slug', GAME_SLUG).single()
    if (!game) return
    const { data: servers } = await db.from('Server').select('id, nameKo').eq('gameId', game.id)
    const select = document.getElementById('server-filter')
    servers?.forEach(s => {
      const opt = document.createElement('option')
      opt.value = s.id; opt.textContent = s.nameKo; select.appendChild(opt)
    })
    select.addEventListener('change', () => loadPage(1))
  }
  async function updateCount() {
    const { data: game } = await db.from('Game').select('id').eq('slug', GAME_SLUG).single()
    if (!game) return
    const { count } = await db.from('Listing').select('*', { count: 'exact', head: true }).eq('status', 'active').eq('gameId', game.id)
    document.getElementById('listing-count').textContent = count + '개'
  }
  function loadPage(page = 1) {
    const serverId = document.getElementById('server-filter').value || undefined
    loadListings({ container: 'listings-container', gameSlug: GAME_SLUG, serverId, page })
  }
  loadServers(); updateCount(); loadPage(1)
</script>
</body>
</html>
