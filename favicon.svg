<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- R letter — path-based for consistent rendering at all sizes -->
  <g stroke="white" stroke-width="9.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left vertical stroke -->
    <line x1="28" y1="22" x2="28" y2="78"/>
    <!-- Arch (bump of R) -->
    <path d="M28,22 L60,22 Q71,22 71,40 Q71,57 60,57 L28,57"/>
    <!-- Diagonal leg -->
    <line x1="50" y1="57" x2="69" y2="78"/>
  </g>
</svg>
