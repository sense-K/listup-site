  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",

    "description": "니케 (NIKKE) 전체 캐릭터 한국어 정보",

      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "홈", "item": "https://resetlist.kr/" },
        { "@type": "ListItem", "position": 2, "name": "니케", "item": "https://resetlist.kr/game/nikke/" },

  <style>
    .g-wrap {
      max-width: 1100px; margin: 0 auto;
      padding: 20px 16px; min-height: calc(100vh - 60px - 140px);
    }

    .g-breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: #94a3b8; margin-bottom: 16px;
    }
    .g-breadcrumb a { color: #64748b; text-decoration: none; }
    .g-breadcrumb a:hover { color: #6c47ff; }
    .g-breadcrumb span { color: #cbd5e1; }

    .g-header { margin-bottom: 20px; }
    .g-header h1 { font-size: 22px; font-weight: 800; color: var(--text,#1e293b); margin: 0 0 4px; }
    .g-header p  { font-size: 14px; color: var(--text-sub,#64748b); margin: 0; }

    .g-filter {
      background: #fff; border: 1px solid var(--border,#e5e7eb);
      border-radius: 16px; padding: 16px; margin-bottom: 16px;
    }
    .g-search {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border,#e5e7eb); border-radius: 10px;
      font-size: 14px; outline: none; margin-bottom: 12px;
      box-sizing: border-box; background: #f8fafc; color: var(--text,#1e293b);
    }
    .g-search:focus { border-color: #c026d3; background: #fff; }

    .g-filter-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      align-items: center; margin-bottom: 8px;
    }
    .g-filter-row:last-child { margin-bottom: 0; }
    .g-filter-label {
      font-size: 11px; font-weight: 700; color: #94a3b8;
      letter-spacing: 0.05em; text-transform: uppercase; margin-right: 2px;
      white-space: nowrap;
    }
    .g-chip {
      display: inline-flex; align-items: center;
      padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--border,#e5e7eb);
      background: transparent; color: var(--text-sub,#64748b);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .g-chip:hover { opacity: 0.8; }
    .g-chip.active { color: #fff; border-color: transparent; }

    .g-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 8px; flex-wrap: wrap;
    }
    .g-count { font-size: 13px; color: var(--text-sub,#64748b); }
    .g-count strong { color: var(--text,#1e293b); }
    .g-sort {
      padding: 7px 12px; border: 1px solid var(--border,#e5e7eb);
      border-radius: 10px; font-size: 13px; font-family: inherit;
      background: #fff; color: var(--text,#1e293b); cursor: pointer; outline: none;
    }

    .g-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }
    @media (max-width: 900px) { .g-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 560px) { .g-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; } }

    .g-card {
      background: #fff; border: 1.5px solid var(--border,#e5e7eb);
      border-radius: 14px; overflow: hidden; cursor: pointer;
      transition: box-shadow 0.15s, transform 0.15s;
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; color: inherit;
    }
    .g-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .g-card.treasure-card { border-color: #c084fc; border-width: 2px; }

    .g-card-img-wrap {
      width: 100%; aspect-ratio: 1;
      position: relative; overflow: hidden;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 100%);
    }
    .g-card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center;
    }

    /* 니케 속성 테두리 */
    .elem-Fire     { border-color: #ef4444; }
    .elem-Water    { border-color: #3b82f6; }
    .elem-Wind     { border-color: #10b981; }
    .elem-Electric { border-color: #fbbf24; }
    .elem-Iron     { border-color: #6b7280; }

    /* 등급 뱃지 */
    .g-tier-badge {
      position: absolute; top: 5px; left: 5px;
      font-size: 10px; font-weight: 800; padding: 2px 6px;
      border-radius: 5px; letter-spacing: 0.03em;
    }
    .badge-SSR { background: linear-gradient(135deg,#fbbf24,#f59e0b); color: #78350f; }
    .badge-SR  { background: linear-gradient(135deg,#a78bfa,#8b5cf6); color: #fff; }
    .badge-R   { background: #e5e7eb; color: #6b7280; }

    /* 애장품 뱃지 */
    .treasure-badge {
      position: absolute; top: 5px; right: 5px;
      font-size: 9px; font-weight: 700; padding: 2px 5px;
      border-radius: 4px; background: #7c3aed; color: #fff; white-space: nowrap;
    }

    .g-card-body {
      padding: 6px 6px 8px; width: 100%;
      box-sizing: border-box; text-align: center;
    }
    .g-card-name {
      font-size: 12px; font-weight: 700; color: #1e293b;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    @media (max-width: 560px) { .g-card-name { font-size: 11px; } }

    .g-elem-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 2px; vertical-align: middle;
      flex-shrink: 0;
    }

    .g-empty { text-align: center; padding: 60px 16px; color: #94a3b8; font-size: 15px; }
  </style>
</head>
<body>
<div id="navbar"></div>

<div class="g-wrap">

  <nav class="g-breadcrumb" aria-label="breadcrumb">
    <a href="/">홈</a>
    <span>›</span>
    <a href="/game/nikke/">니케</a>
    <span>›</span>
    <span style="color:#1e293b;font-weight:600;">캐릭터 도감</span>
  </nav>

  <div class="g-header">
    <h1>니케 캐릭터 도감</h1>
    <p>니케 (NIKKE) 전체 캐릭터를 등급, 속성, 무기, 제조사, 버스트별로 찾아보세요</p>
  </div>

  <div class="g-filter">
    <input class="g-search" id="search" type="text" placeholder="캐릭터 이름 검색...">

    <!-- 등급 -->
    <div class="g-filter-row">
      <span class="g-filter-label">등급</span>
      <button class="g-chip active" data-group="rarity" data-val="" style="--c:#c026d3;">전체</button>
      <button class="g-chip" data-group="rarity" data-val="SSR" style="--c:#f59e0b;">SSR</button>
      <button class="g-chip" data-group="rarity" data-val="SR"  style="--c:#8b5cf6;">SR</button>
      <button class="g-chip" data-group="rarity" data-val="R"   style="--c:#9ca3af;">R</button>
    </div>

    <!-- 속성 -->
    <div class="g-filter-row">
      <span class="g-filter-label">속성</span>
      <button class="g-chip active" data-group="element" data-val="" style="--c:#c026d3;">전체</button>
      <button class="g-chip" data-group="element" data-val="Fire"     style="--c:#ef4444;">🔥 화염</button>
      <button class="g-chip" data-group="element" data-val="Water"    style="--c:#3b82f6;">💧 수속</button>
      <button class="g-chip" data-group="element" data-val="Wind"     style="--c:#10b981;">🌿 풍속</button>
      <button class="g-chip" data-group="element" data-val="Electric" style="--c:#fbbf24;">⚡ 전기</button>
      <button class="g-chip" data-group="element" data-val="Iron"     style="--c:#6b7280;">🔩 철갑</button>
    </div>

    <!-- 무기 -->
    <div class="g-filter-row">
      <span class="g-filter-label">무기</span>
      <button class="g-chip active" data-group="weapon" data-val="" style="--c:#c026d3;">전체</button>
      <button class="g-chip" data-group="weapon" data-val="Shotgun"         style="--c:#64748b;">샷건</button>
      <button class="g-chip" data-group="weapon" data-val="SMG"             style="--c:#64748b;">SMG</button>
      <button class="g-chip" data-group="weapon" data-val="Assault Rifle"   style="--c:#64748b;">어설트</button>
      <button class="g-chip" data-group="weapon" data-val="Minigun"         style="--c:#64748b;">미니건</button>
      <button class="g-chip" data-group="weapon" data-val="Rocket Launcher" style="--c:#64748b;">로켓</button>
      <button class="g-chip" data-group="weapon" data-val="Sniper Rifle"    style="--c:#64748b;">스나이퍼</button>
    </div>

    <!-- 버스트 -->
    <div class="g-filter-row">
      <span class="g-filter-label">버스트</span>
      <button class="g-chip active" data-group="burst" data-val="" style="--c:#c026d3;">전체</button>
      <button class="g-chip" data-group="burst" data-val="1"   style="--c:#0ea5e9;">버스트 I</button>
      <button class="g-chip" data-group="burst" data-val="2"   style="--c:#8b5cf6;">버스트 II</button>
      <button class="g-chip" data-group="burst" data-val="3"   style="--c:#ef4444;">버스트 III</button>
      <button class="g-chip" data-group="burst" data-val="All" style="--c:#f59e0b;">All</button>
    </div>

    <!-- 제조사 -->
    <div class="g-filter-row">
      <span class="g-filter-label">제조사</span>
      <button class="g-chip active" data-group="mfg" data-val="" style="--c:#c026d3;">전체</button>
      <button class="g-chip" data-group="mfg" data-val="Elysion"  style="--c:#3b82f6;">엘리시온</button>
      <button class="g-chip" data-group="mfg" data-val="Missilis" style="--c:#ef4444;">미사일리스</button>
      <button class="g-chip" data-group="mfg" data-val="Tetra"    style="--c:#10b981;">테트라</button>
      <button class="g-chip" data-group="mfg" data-val="Pilgrim"  style="--c:#f59e0b;">필그림</button>
      <button class="g-chip" data-group="mfg" data-val="Abnormal" style="--c:#c026d3;">콜라보</button>
    </div>
  </div>

  <div class="g-toolbar">
    <div class="g-count" id="count"></div>
    <select class="g-sort" id="sort">
      <option value="rarity">등급순</option>
      <option value="name">이름순</option>
    </select>
  </div>

  <div class="g-grid" id="grid">
    <div class="g-empty" style="grid-column:1/-1;">불러오는 중...</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
  const ELEM_COLOR = {
    'Fire':'#ef4444', 'Water':'#3b82f6', 'Wind':'#10b981',
    'Electric':'#fbbf24', 'Iron':'#6b7280',
  }
  const RARITY_ORDER = ['SSR', 'SR', 'R']

  let allChars = []
  const filters = { rarity: '', element: '', weapon: '', burst: '', mfg: '' }

  async function init() {
    document.getElementById('navbar').innerHTML = renderNavbar()
    loadAndRenderGameUI('nikke')

    try {
      const { data: game } = await db.from('Game').select('id').eq('slug','nikke').single()
      if (!game) throw new Error('니케 게임 정보를 찾을 수 없어요.')

      const { data: chars, error } = await db
        .from('Character')
        .select('id, nameKo, nameEn, rarity, element, weaponType, burstType, manufacturer, slug, imageUrl, metadata')
        .eq('gameId', game.id)
        .eq('isActive', true)
        .order('nameKo')

      if (error) throw error

      allChars = chars ?? []
      document.querySelector('.g-header p').textContent =
        `니케 (NIKKE) 전체 ${allChars.length}명의 캐릭터를 등급, 속성, 무기, 제조사, 버스트별로 찾아보세요`

      render()
    } catch(e) {
      document.getElementById('grid').innerHTML =
        `<div class="g-empty" style="grid-column:1/-1;color:#ef4444;">⚠️ ${e.message}</div>`
    }
  }

  function render() {
    const q    = document.getElementById('search').value.trim()
    const sort = document.getElementById('sort').value

    let list = allChars.filter(c => {
      if (filters.rarity  && c.rarity       !== filters.rarity)  return false
      if (filters.element && c.element      !== filters.element) return false
      if (filters.weapon  && c.weaponType   !== filters.weapon)  return false
      if (filters.burst   && c.burstType    !== filters.burst)   return false
      if (filters.mfg     && c.manufacturer !== filters.mfg)     return false
      if (q && !c.nameKo.includes(q))                            return false
      return true
    })

    if (sort === 'name') {
      list = list.slice().sort((a,b) => a.nameKo.localeCompare(b.nameKo,'ko'))
    } else {
      list = list.slice().sort((a,b) => {
        const ra = RARITY_ORDER.indexOf(a.rarity ?? '')
        const rb = RARITY_ORDER.indexOf(b.rarity ?? '')
        if (ra !== rb) return (ra === -1 ? 99 : ra) - (rb === -1 ? 99 : rb)
        return a.nameKo.localeCompare(b.nameKo,'ko')
      })
    }

    document.getElementById('count').innerHTML = `<strong>${list.length}명</strong> 표시 중`
    const grid = document.getElementById('grid')

    if (list.length === 0) {
      grid.innerHTML = '<div class="g-empty" style="grid-column:1/-1;">조건에 맞는 캐릭터가 없어요</div>'
      return
    }

    grid.innerHTML = list.map(c => {
      const cardImg = c.metadata?.cardImageUrl || c.imageUrl
      const elemClass = c.element ? `elem-${c.element}` : ''
      const isTreasure = c.slug?.endsWith('-treasure')
      const treasureClass = isTreasure ? 'treasure-card' : ''
      const href = c.slug ? `/game/nikke/characters/${c.slug}/` : '#'
      const dotColor = ELEM_COLOR[c.element] || '#999'
      const rarityBadge = c.rarity ? `badge-${c.rarity}` : ''
      return `
        <a class="g-card ${elemClass} ${treasureClass}" href="${href}" title="${c.nameKo}${c.nameEn ? ' ('+c.nameEn+')' : ''}">
          <div class="g-card-img-wrap">
            ${cardImg
              ? `<img src="${cardImg}" alt="${c.nameKo}" loading="lazy" onerror="this.parentElement.style.background='#1e1e2e'">`
              : ''
            }
            ${rarityBadge ? `<span class="g-tier-badge ${rarityBadge}">${c.rarity}</span>` : ''}
            ${isTreasure ? `<span class="treasure-badge">💎 애장품</span>` : ''}
          </div>
          <div class="g-card-body">
            <div class="g-card-name">
              ${c.element ? `<span class="g-elem-dot" style="background:${dotColor};"></span>` : ''}${c.nameKo}
            </div>
          </div>
        </a>`
    }).join('')
  }

  function bindChip(btn) {
    btn.addEventListener('click', () => {
      const group = btn.dataset.group
      const val   = btn.dataset.val
      filters[group] = val
      document.querySelectorAll(`.g-chip[data-group="${group}"]`).forEach(b => {
        b.classList.remove('active')
        b.style.background  = ''
        b.style.borderColor = ''
        b.style.color       = ''
      })
      btn.classList.add('active')
      const c = btn.style.getPropertyValue('--c') || '#c026d3'
      btn.style.background  = c
      btn.style.borderColor = c
      btn.style.color       = '#fff'
      render()
    })
    if (btn.classList.contains('active')) {
      const c = btn.style.getPropertyValue('--c') || '#c026d3'
      btn.style.background  = c
      btn.style.borderColor = c
      btn.style.color       = '#fff'
    }
  }

  document.querySelectorAll('.g-chip').forEach(bindChip)
  document.getElementById('search').addEventListener('input', render)
  document.getElementById('sort').addEventListener('change', render)

  init()
</script>

<div id="footer"></div>
</body>
</html>
